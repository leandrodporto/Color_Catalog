<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Catálogo de Cores</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f6f7f9;
      --panel: #ffffff;
      --text: #20242a;
      --muted: #667085;
      --line: #dde3ea;
      --shadow: 0 12px 28px rgba(22, 29, 37, 0.08);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      background: var(--bg);
      color: var(--text);
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    header {
      position: sticky;
      top: 0;
      z-index: 2;
      border-bottom: 1px solid var(--line);
      background: rgba(246, 247, 249, 0.92);
      backdrop-filter: blur(14px);
    }

    .toolbar {
      width: min(1180px, calc(100% - 32px));
      margin: 0 auto;
      padding: 18px 0;
      display: grid;
      grid-template-columns: minmax(180px, 1fr) minmax(220px, 360px);
      gap: 16px;
      align-items: center;
    }

    h1 {
      margin: 0;
      font-size: clamp(1.35rem, 1.1rem + 1vw, 2rem);
      font-weight: 800;
      letter-spacing: 0;
    }

    .meta {
      margin-top: 4px;
      color: var(--muted);
      font-size: 0.94rem;
    }

    .search {
      width: 100%;
      height: 44px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--panel);
      color: var(--text);
      font: inherit;
      padding: 0 14px;
      outline: none;
      box-shadow: 0 1px 0 rgba(22, 29, 37, 0.03);
    }

    .search:focus {
      border-color: #4b7bec;
      box-shadow: 0 0 0 3px rgba(75, 123, 236, 0.16);
    }

    main {
      width: min(1180px, calc(100% - 32px));
      margin: 0 auto;
      padding: 26px 0 40px;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
      gap: 14px;
    }

    .card {
      overflow: hidden;
      min-height: 170px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--panel);
      box-shadow: var(--shadow);
    }

    .swatch {
      min-height: 104px;
      display: flex;
      align-items: flex-end;
      padding: 12px;
      font-weight: 800;
      letter-spacing: 0;
    }

    .info {
      padding: 12px;
    }

    .name {
      margin: 0 0 7px;
      font-size: 0.98rem;
      font-weight: 700;
      line-height: 1.25;
      overflow-wrap: anywhere;
    }

    .hex {
      display: inline-flex;
      align-items: center;
      min-height: 24px;
      border-radius: 999px;
      background: #eef2f6;
      color: #3c4654;
      font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
      font-size: 0.82rem;
      padding: 3px 9px;
    }

    .empty,
    .error {
      padding: 22px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--panel);
      color: var(--muted);
    }

    .hidden {
      display: none;
    }

    @media (max-width: 680px) {
      .toolbar {
        grid-template-columns: 1fr;
      }

      main {
        padding-top: 18px;
      }
    }
  </style>
</head>
<body>
  <header>
    <div class="toolbar">
      <div>
        <h1>Catálogo de Cores</h1>
        <div class="meta" id="counter">Carregando cores...</div>
      </div>
      <input class="search" id="search" type="search" placeholder="Buscar cor ou hex" autocomplete="off">
    </div>
  </header>

  <main>
    <div class="grid" id="grid"></div>
    <div class="empty hidden" id="empty">Nenhuma cor encontrada.</div>
    <div class="error hidden" id="error">Não foi possível carregar o arquivo colors.json.</div>
  </main>

  <script>
    const grid = document.querySelector("#grid");
    const search = document.querySelector("#search");
    const counter = document.querySelector("#counter");
    const empty = document.querySelector("#empty");
    const error = document.querySelector("#error");

    let colors = [];

    function normalizeHex(hex) {
      return String(hex || "").replace("#", "").trim().toUpperCase();
    }

    function textColorFor(hex) {
      const clean = normalizeHex(hex);
      const red = parseInt(clean.slice(0, 2), 16);
      const green = parseInt(clean.slice(2, 4), 16);
      const blue = parseInt(clean.slice(4, 6), 16);
      const brightness = (red * 299 + green * 587 + blue * 114) / 1000;
      return brightness > 150 ? "#17202a" : "#ffffff";
    }

    function render(list) {
      grid.innerHTML = list.map((color) => {
        const hex = normalizeHex(color.hex);
        const name = color.name || "Sem nome";

        return `
          <article class="card">
            <div class="swatch" style="background:#${hex};color:${textColorFor(hex)}">#${hex}</div>
            <div class="info">
              <p class="name">${name}</p>
              <span class="hex">#${hex}</span>
            </div>
          </article>
        `;
      }).join("");

      counter.textContent = `${list.length} de ${colors.length} cores`;
      empty.classList.toggle("hidden", list.length > 0);
    }

    function filterColors() {
      const query = search.value.trim().toLowerCase();
      const filtered = colors.filter((color) => {
        const hex = normalizeHex(color.hex).toLowerCase();
        const name = String(color.name || "").toLowerCase();
        return name.includes(query) || hex.includes(query);
      });

      render(filtered);
    }

    fetch("colors.json")
      .then((response) => {
        if (!response.ok) throw new Error("colors.json not found");
        return response.json();
      })
      .then((data) => {
        colors = Array.isArray(data) ? data : [];
        render(colors);
      })
      .catch(() => {
        counter.textContent = "Erro ao carregar";
        error.classList.remove("hidden");
      });

    search.addEventListener("input", filterColors);
  </script>
</body>
</html>
